name: v30.1.1 release build

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Full 40-character commit SHA to build
        required: true
        type: string
      package_label:
        description: Explicit unpublished prerelease label (must match source RC)
        required: true
        default: 30.1.1-alpha1
        type: string
      target:
        description: Build target to run (manual runs never publish)
        required: true
        type: choice
        default: all
        options:
          - all
          - linux-64-bit
          - linux-arm-64-bit
          - windows-64-bit
          - macos-all
          - macos-64-bit
          - macos-arm-64-bit
  push:
    tags:
      - 'v30.1.1'

permissions:
  contents: read

concurrency:
  group: v30.1.1-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve and authorize immutable release target
    runs-on: ubuntu-22.04
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      source_date_epoch: ${{ steps.resolve.outputs.source_date_epoch }}
      version: ${{ steps.resolve.outputs.version }}
      package_label: ${{ steps.resolve.outputs.package_label }}
      configured_version: ${{ steps.resolve.outputs.configured_version }}
      release_candidate: ${{ steps.resolve.outputs.release_candidate }}
      asset_prefix: ${{ steps.resolve.outputs.asset_prefix }}
      target: ${{ steps.resolve.outputs.target }}
      publish: ${{ steps.resolve.outputs.publish }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout requested target
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_sha || github.ref }}
          fetch-depth: 0

      - name: Import the trusted release verification key
        if: ${{ github.event_name == 'push' }}
        shell: bash
        env:
          RELEASE_GPG_PUBLIC_KEY_B64: ${{ secrets.RELEASE_GPG_PUBLIC_KEY_B64 }}
          RELEASE_GPG_FINGERPRINT: ${{ vars.RELEASE_GPG_FINGERPRINT }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_GPG_PUBLIC_KEY_B64"
          [[ "$RELEASE_GPG_FINGERPRINT" =~ ^([0-9A-Fa-f]{40}|[0-9A-Fa-f]{64})$ ]]
          umask 077
          printf '%s' "$RELEASE_GPG_PUBLIC_KEY_B64" | base64 --decode > release-public-key.asc
          gpg --batch --import release-public-key.asc
          imported=$(gpg --batch --with-colons --fingerprint "$RELEASE_GPG_FINGERPRINT" |
            awk -F: '$1 == "fpr" {print toupper($10); exit}')
          test "$imported" = "${RELEASE_GPG_FINGERPRINT^^}"

      - id: resolve
        name: Verify identity, tag, version, and exact SHA
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.target_sha }}
          REQUESTED_PACKAGE_LABEL: ${{ inputs.package_label }}
          REQUESTED_TARGET: ${{ inputs.target }}
          RELEASE_GPG_FINGERPRINT: ${{ vars.RELEASE_GPG_FINGERPRINT }}
        run: |
          set -euo pipefail
          TARGET_SHA=$(git rev-parse HEAD)
          [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]
          MAJOR=$(sed -n "s/^define(_CLIENT_VERSION_MAJOR, \([0-9]*\))$/\1/p" configure.ac)
          MINOR=$(sed -n "s/^define(_CLIENT_VERSION_MINOR, \([0-9]*\))$/\1/p" configure.ac)
          BUILD=$(sed -n "s/^define(_CLIENT_VERSION_BUILD, \([0-9]*\))$/\1/p" configure.ac)
          RC=$(sed -n "s/^define(_CLIENT_VERSION_RC, \([0-9]*\))$/\1/p" configure.ac)
          IS_RELEASE=$(sed -n "s/^define(_CLIENT_VERSION_IS_RELEASE, \(.*\))$/\1/p" configure.ac)
          BASE_VERSION="$MAJOR.$MINOR.$BUILD"
          test "$BASE_VERSION" = "30.1.1" || {
            echo "::error::This workflow is locked to the v30.1.1 source line"
            exit 1
          }
          [[ "$RC" =~ ^[0-9]+$ ]]
          CONFIGURED_VERSION="$BASE_VERSION"
          if [[ "$RC" != "0" ]]; then
            CONFIGURED_VERSION="${BASE_VERSION}rc${RC}"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            [[ "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::target_sha must be a full 40-character commit SHA"
              exit 1
            }
            test "$TARGET_SHA" = "$REQUESTED_SHA"
            [[ "$REQUESTED_PACKAGE_LABEL" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha[1-9][0-9]*$ ]] || {
              echo "::error::Manual builds require an explicit major.minor.patch-alphaN package label"
              exit 1
            }
            [[ "$RC" =~ ^[1-9][0-9]*$ ]]
            test "$IS_RELEASE" = "false" || {
              echo "::error::Manual alpha builds require CLIENT_VERSION_IS_RELEASE=false"
              exit 1
            }
            test "$REQUESTED_PACKAGE_LABEL" = "$BASE_VERSION-alpha$RC" || {
              echo "::error::Package label must match the source version and RC: $BASE_VERSION-alpha$RC"
              exit 1
            }
            VERSION="$BASE_VERSION"
            PACKAGE_LABEL="$REQUESTED_PACKAGE_LABEL"
            ASSET_PREFIX="Blackcoin-$PACKAGE_LABEL-$TARGET_SHA"
            TARGET="$REQUESTED_TARGET"
            TAG=""
            PUBLISH=false
            python3 ci/release/verify_source_identity.py \
              --head "$TARGET_SHA" \
              --repository "$GITHUB_REPOSITORY" \
              --require-actor \
              --actor "$GITHUB_ACTOR"
          else
            TAG="$GITHUB_REF_NAME"
            VERSION="${TAG#v}"
            PACKAGE_LABEL="$VERSION"
            ASSET_PREFIX="Blackcoin-$VERSION"
            TARGET=all
            PUBLISH=true
            python3 ci/release/verify_source_identity.py \
              --head "$TARGET_SHA" \
              --repository "$GITHUB_REPOSITORY" \
              --require-actor \
              --actor "$GITHUB_ACTOR" \
              --tag "$TAG" \
              --require-signatures \
              --signing-fingerprint "$RELEASE_GPG_FINGERPRINT"
          fi

          test "$VERSION" = "$BASE_VERSION"
          if [[ "$PUBLISH" == true ]]; then
            test "$RC" = "0"
            test "$IS_RELEASE" = "true" || {
              echo "::error::configure.ac still marks this commit as a development build"
              exit 1
            }
            NOTES="doc/release-notes/release-notes-$VERSION.md"
            test -s "$NOTES" || {
              echo "::error::Final tracked release notes are required at $NOTES"
              exit 1
            }
            ! grep -q 'RELEASE_NOTES_NOT_FINAL' "$NOTES" || {
              echo "::error::Release notes are still marked non-final"
              exit 1
            }
          fi

          {
            echo "target_sha=$TARGET_SHA"
            echo "source_date_epoch=$(git show -s --format=%ct "$TARGET_SHA")"
            echo "version=$VERSION"
            echo "package_label=$PACKAGE_LABEL"
            echo "configured_version=$CONFIGURED_VERSION"
            echo "release_candidate=$RC"
            echo "asset_prefix=$ASSET_PREFIX"
            echo "target=$TARGET"
            echo "publish=$PUBLISH"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

  safety-gate:
    name: Exact-SHA alpha or production safety gate
    needs: resolve-target
    permissions:
      contents: read
    uses: ./.github/workflows/pr-gate.yml
    with:
      target_sha: ${{ needs.resolve-target.outputs.target_sha }}
      # Manual, unpublished alpha artifacts wait for the core gate. Only the
      # authenticated tag-push publication path may request the production-only
      # exhaustive, native-macOS, sanitizer, and fuzz jobs.
      release_mode: ${{ needs.resolve-target.outputs.publish == 'true' }}

  select-targets:
    name: Select build target
    needs:
      - resolve-target
      - safety-gate
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      macos_selected: ${{ steps.matrix.outputs.macos_selected }}
      windows_selected: ${{ steps.matrix.outputs.windows_selected }}
    steps:
      - id: matrix
        shell: bash
        env:
          TARGET: ${{ needs.resolve-target.outputs.target }}
        run: |
          set -euo pipefail
          linux_64='{"name":"linux-64-bit","host":"x86_64-pc-linux-gnu","os":"ubuntu-22.04","packages":"python3","dep-opts":"","config-opts":"--enable-sse2 --enable-glibc-back-compat LDFLAGS=-static-libstdc++","goal":"install"}'
          linux_arm_64='{"name":"linux-arm-64-bit","host":"aarch64-linux-gnu","os":"ubuntu-22.04","packages":"g++-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-user","dep-opts":"","config-opts":"--enable-glibc-back-compat LDFLAGS=-static-libstdc++","goal":"install"}'
          windows_64='{"name":"windows-64-bit","host":"x86_64-w64-mingw32","os":"ubuntu-22.04","packages":"nsis g++-mingw-w64-x86-64 build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git zip wine64","postinstall":"sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix\nsudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix","dep-opts":"","config-opts":"--enable-sse2 LDFLAGS=-static-libgcc","goal":"deploy install"}'
          macos_64='{"name":"macos-64-bit","host":"x86_64-apple-darwin","os":"ubuntu-22.04","packages":"curl bsdmainutils cmake libz-dev python3-setuptools libtinfo5 xorriso zip","dep-opts":"","config-opts":"--enable-sse2","goal":"deploy","sdk":"12.2-12B45b","sdk-sha256":"df75d30ecafc429e905134333aeae56ac65fac67cb4182622398fd717df77619"}'
          macos_arm_64='{"name":"macos-arm-64-bit","host":"aarch64-apple-darwin","os":"ubuntu-22.04","packages":"curl bsdmainutils cmake libz-dev python3-setuptools libtinfo5 xorriso zip","dep-opts":"","config-opts":"","goal":"deploy","sdk":"12.2-12B45b","sdk-sha256":"df75d30ecafc429e905134333aeae56ac65fac67cb4182622398fd717df77619"}'
          case "$TARGET" in
            all) matrix="[$linux_64,$linux_arm_64,$windows_64,$macos_64,$macos_arm_64]" ;;
            linux-64-bit) matrix="[$linux_64]" ;;
            linux-arm-64-bit) matrix="[$linux_arm_64]" ;;
            windows-64-bit) matrix="[$windows_64]" ;;
            macos-all) matrix="[$macos_64,$macos_arm_64]" ;;
            macos-64-bit) matrix="[$macos_64]" ;;
            macos-arm-64-bit) matrix="[$macos_arm_64]" ;;
            *) echo "Unknown build target: $TARGET" >&2; exit 1 ;;
          esac
          matrix=$(BASE_MATRIX="$matrix" python3 - <<'PY'
          import json
          import os

          result = []
          for target in json.loads(os.environ["BASE_MATRIX"]):
              for builder in ("primary", "verifier"):
                  entry = dict(target)
                  entry["builder"] = builder
                  result.append(entry)
          print(json.dumps(result, separators=(",", ":")))
          PY
          )
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [[ "$matrix" == *macos-64-bit* || "$matrix" == *macos-arm-64-bit* ]]; then
            echo "macos_selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "macos_selected=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$matrix" == *windows-64-bit* ]]; then
            echo "windows_selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "windows_selected=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.name }} (${{ matrix.builder }})
    needs:
      - resolve-target
      - safety-gate
      - select-targets
    runs-on: ${{ matrix.os }}
    env:
      MAKEJOBS: 4
      SDK_URL: https://bitcoincore.org/depends-sources/sdks
      SOURCE_DATE_EPOCH: ${{ needs.resolve-target.outputs.source_date_epoch }}
      TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      VERSION: ${{ needs.resolve-target.outputs.version }}
      PACKAGE_LABEL: ${{ needs.resolve-target.outputs.package_label }}
      CONFIGURED_VERSION: ${{ needs.resolve-target.outputs.configured_version }}
      ASSET_PREFIX: ${{ needs.resolve-target.outputs.asset_prefix }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-targets.outputs.matrix) }}
    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends make automake cmake curl g++ libtool gperf binutils-gold bsdmainutils pkg-config python3 patch bison lbzip2 xz-utils libxml2-utils gettext xutils-dev
          sudo apt-get install -y --no-install-recommends ${{ matrix.packages }}
          if command -v pkg-config >/dev/null && ! command -v "${{ matrix.host }}-pkg-config" >/dev/null; then
            sudo ln -s "$(command -v pkg-config)" "/usr/local/bin/${{ matrix.host }}-pkg-config"
          fi

      - name: Post install
        if: ${{ matrix.postinstall }}
        run: ${{ matrix.postinstall }}

      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: SDK cache
        if: ${{ matrix.sdk }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ./depends/sdk-sources
          key: ${{ matrix.name }}-sdk-${{ matrix.sdk-sha256 }}

      - name: Install verified SDK
        if: ${{ matrix.sdk }}
        shell: bash
        run: |
          set -euo pipefail
          archive="Xcode-${{ matrix.sdk }}-extracted-SDK-with-libcxx-headers.tar.gz"
          mkdir -p depends/sdk-sources depends/SDKs
          if [[ ! -f "depends/sdk-sources/$archive" ]]; then
            curl --location --fail "$SDK_URL/$archive" -o "depends/sdk-sources/$archive"
          fi
          echo "${{ matrix.sdk-sha256 }}  depends/sdk-sources/$archive" | sha256sum --check --strict
          tar -C depends/SDKs -xzf "depends/sdk-sources/$archive"

      - name: Dependency cache
        if: ${{ matrix.builder == 'primary' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ./depends/built
          key: ${{ matrix.name }}-depends-${{ hashFiles('depends/*.mk', 'depends/packages/*', 'depends/patches/**/*') }}

      - name: Build depends
        run: make -j "$MAKEJOBS" -C depends HOST=${{ matrix.host }} ${{ matrix.dep-opts }}

      - name: Build Blackcoin
        shell: bash
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure --prefix="$PWD/depends/${{ matrix.host }}" ${{ matrix.config-opts }} --enable-reduce-exports || { cat config.log; exit 1; }
          grep -q "define USE_BDB 1" src/config/bitcoin-config.h || {
            echo "::error::Release build configured without Berkeley DB wallet support"
            exit 1
          }
          grep -q "define USE_SQLITE 1" src/config/bitcoin-config.h || {
            echo "::error::Release build configured without SQLite wallet support"
            exit 1
          }
          if ! make -j "$MAKEJOBS" ${{ matrix.goal }}; then
            make ${{ matrix.goal }} V=1
          fi

      - name: Build and execute target crypto vectors
        if: ${{ !startsWith(matrix.name, 'macos-') }}
        shell: bash
        run: |
          set -euo pipefail
          test_target=test/test_blackcoin
          test_binary=src/test/test_blackcoin
          if [[ "${{ matrix.name }}" == "windows-64-bit" ]]; then
            test_target+=.exe
            test_binary+=.exe
          fi
          make -C src -j "$MAKEJOBS" "$test_target"
          case "${{ matrix.name }}" in
            linux-64-bit)
              "$test_binary" --run_test=crypto_hardening_tests --log_level=test_suite
              ;;
            linux-arm-64-bit)
              qemu-aarch64 -L /usr/aarch64-linux-gnu \
                "$test_binary" --run_test=crypto_hardening_tests --log_level=test_suite
              ;;
            windows-64-bit)
              wine_runner=$(command -v wine64 || command -v wine)
              test -n "$wine_runner"
              WINEDEBUG=-all "$wine_runner" "$test_binary" \
                --run_test=crypto_hardening_tests --log_level=test_suite
              ;;
          esac

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ matrix.host }}"
          OUT="$GITHUB_WORKSPACE/release-assets"
          mkdir -p "$OUT"
          export LC_ALL=C
          normalize_tree() {
            find "$1" -exec touch -h -d "@$SOURCE_DATE_EPOCH" {} +
          }
          deterministic_tar() {
            local root="$1"
            local output="$2"
            shift 2
            tar -C "$root" --sort=name --mtime="@$SOURCE_DATE_EPOCH" \
              --owner=0 --group=0 --numeric-owner --format=gnu \
              --pax-option=delete=atime,delete=ctime -cf - "$@" | gzip -n -9 > "$output"
          }
          case "${{ matrix.name }}" in
            linux-64-bit)
              normalize_tree "depends/$HOST/bin"
              mapfile -t files < <(cd "depends/$HOST/bin" && find . -maxdepth 1 -type f -name 'blackcoin*' -printf '%P\n' | sort)
              test "${#files[@]}" -gt 0
              deterministic_tar "depends/$HOST/bin" "$OUT/$ASSET_PREFIX-Linux-x86_64.tar.gz" "${files[@]}"
              ;;
            linux-arm-64-bit)
              normalize_tree "depends/$HOST/bin"
              mapfile -t files < <(cd "depends/$HOST/bin" && find . -maxdepth 1 -type f -name 'blackcoin*' -printf '%P\n' | sort)
              test "${#files[@]}" -gt 0
              deterministic_tar "depends/$HOST/bin" "$OUT/$ASSET_PREFIX-Linux-ARM64.tar.gz" "${files[@]}"
              ;;
            windows-64-bit)
              normalize_tree "depends/$HOST/bin"
              mapfile -t files < <(python3 ci/release/verify_windows_payload.py names)
              for file in "${files[@]}"; do
                test -f "depends/$HOST/bin/$file" && test ! -L "depends/$HOST/bin/$file"
              done
              (cd "depends/$HOST/bin" && printf '%s\n' "${files[@]}" | zip -X -9j "$OUT/$ASSET_PREFIX-Windows-x86_64-Portable.zip" -@)
              python3 ci/release/verify_windows_payload.py archive \
                "$OUT/$ASSET_PREFIX-Windows-x86_64-Portable.zip"
              mapfile -t installers < <(find . -maxdepth 1 -type f -name "blackcoin-$CONFIGURED_VERSION-win64-setup.exe" -printf '%P\n' | sort)
              test "${#installers[@]}" -eq 1
              cp "${installers[0]}" "$OUT/$ASSET_PREFIX-Windows-x86_64-Installer.exe"
              touch -d "@$SOURCE_DATE_EPOCH" "$OUT/$ASSET_PREFIX-Windows-x86_64-Installer.exe"
              ;;
            macos-64-bit)
              normalize_tree dist/blackcoin-qt.app
              (cd dist && find blackcoin-qt.app -print | sort | zip -X -9 -y "$OUT/$ASSET_PREFIX-macOS-Intel-x86_64-Qt-app.zip" -@)
              deterministic_tar dist "$OUT/$ASSET_PREFIX-macOS-Intel-x86_64-Qt-app.tar.gz" blackcoin-qt.app
              ;;
            macos-arm-64-bit)
              normalize_tree dist/blackcoin-qt.app
              (cd dist && find blackcoin-qt.app -print | sort | zip -X -9 -y "$OUT/$ASSET_PREFIX-macOS-Apple-Silicon-ARM64-Qt-app.zip" -@)
              deterministic_tar dist "$OUT/$ASSET_PREFIX-macOS-Apple-Silicon-ARM64-Qt-app.tar.gz" blackcoin-qt.app
              ;;
          esac
          printf '%s\n' "$TARGET_SHA" > "$OUT/$ASSET_PREFIX-${{ matrix.name }}-SOURCE_COMMIT.txt"

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ needs.resolve-target.outputs.package_label }}-${{ matrix.name }}-${{ matrix.builder }}-${{ needs.resolve-target.outputs.target_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload configured Windows installer recipe
        if: ${{ matrix.name == 'windows-64-bit' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-installer-recipe-${{ needs.resolve-target.outputs.package_label }}-${{ matrix.builder }}-${{ needs.resolve-target.outputs.target_sha }}
          path: share/setup.nsi
          if-no-files-found: error
          retention-days: 7

  reproducibility:
    name: Verify independent byte-for-byte rebuilds
    needs:
      - resolve-target
      - select-targets
      - build
    runs-on: ubuntu-22.04
    env:
      TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      VERSION: ${{ needs.resolve-target.outputs.version }}
      PACKAGE_LABEL: ${{ needs.resolve-target.outputs.package_label }}
      CONFIGURED_VERSION: ${{ needs.resolve-target.outputs.configured_version }}
      RELEASE_CANDIDATE: ${{ needs.resolve-target.outputs.release_candidate }}
      ASSET_PREFIX: ${{ needs.resolve-target.outputs.asset_prefix }}
    steps:
      - name: Checkout immutable verification code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 0

      - name: Download both isolated build sets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: release-${{ needs.resolve-target.outputs.package_label }}-*-${{ needs.resolve-target.outputs.target_sha }}

      - name: Compare every target byte for byte
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          primaries=(artifacts/release-"$PACKAGE_LABEL"-*-primary-"$TARGET_SHA")
          verifiers=(artifacts/release-"$PACKAGE_LABEL"-*-verifier-"$TARGET_SHA")
          test "${#primaries[@]}" -gt 0
          test "${#primaries[@]}" -eq "${#verifiers[@]}"
          mkdir -p release-assets
          report="release-assets/$ASSET_PREFIX-REPRODUCIBILITY.txt"
          {
            printf 'package_label=%s\n' "$PACKAGE_LABEL"
            printf 'configured_version=%s\n' "$CONFIGURED_VERSION"
          } > "$report"
          for primary in "${primaries[@]}"; do
            artifact_name=$(basename "$primary")
            artifact_prefix="release-$PACKAGE_LABEL-"
            target="${artifact_name#"$artifact_prefix"}"
            suffix="-primary-$TARGET_SHA"
            target="${target%"$suffix"}"
            verifier="artifacts/release-$PACKAGE_LABEL-$target-verifier-$TARGET_SHA"
            test -d "$verifier"
            python3 ci/release/verify_reproducible.py \
              --primary "$primary" --verifier "$verifier"
            printf 'target=%s\n' "$target" >> "$report"
            while IFS= read -r file; do
              printf '%s  %s/%s\n' \
                "$(sha256sum "$primary/$file" | awk '{print $1}')" "$target" "$file"
            done < <(cd "$primary" && find . -type f -printf '%P\n' | sort)
          done
          printf 'source_commit=%s\n' "$TARGET_SHA" >> "$report"

      - name: Download both isolated Windows installer recipes
        if: ${{ needs.select-targets.outputs.windows_selected == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: installer-recipes
          pattern: windows-installer-recipe-${{ needs.resolve-target.outputs.package_label }}-*-${{ needs.resolve-target.outputs.target_sha }}

      - name: Verify the Windows installer recipe is reproducible
        if: ${{ needs.select-targets.outputs.windows_selected == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 ci/release/verify_reproducible.py \
            --primary "installer-recipes/windows-installer-recipe-$PACKAGE_LABEL-primary-$TARGET_SHA" \
            --verifier "installer-recipes/windows-installer-recipe-$PACKAGE_LABEL-verifier-$TARGET_SHA"

      - name: Assemble conspicuously unsigned exact-SHA canary bundle
        if: ${{ needs.resolve-target.outputs.publish != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p canary-assets
          primaries=(artifacts/release-"$PACKAGE_LABEL"-*-primary-"$TARGET_SHA")
          test "${#primaries[@]}" -gt 0
          for primary in "${primaries[@]}"; do
            while IFS= read -r -d '' source; do
              test -f "$source" && test ! -L "$source"
              destination="canary-assets/$(basename "$source")"
              test ! -e "$destination"
              cp "$source" "$destination"
            done < <(find "$primary" -mindepth 1 -maxdepth 1 -print0)
          done
          cp "release-assets/$ASSET_PREFIX-REPRODUCIBILITY.txt" canary-assets/

          marker="canary-assets/$ASSET_PREFIX-UNSIGNED-CANARY.txt"
          {
            echo 'UNSIGNED CANARY ARTIFACTS - NOT A PRODUCTION RELEASE'
            echo
            echo "package_label=$PACKAGE_LABEL"
            echo "source_version=$VERSION"
            echo "configured_version=$CONFIGURED_VERSION"
            echo "source_commit=$TARGET_SHA"
            echo "workflow_run_id=$GITHUB_RUN_ID"
            echo 'signed=false'
            echo 'notarized=false'
            echo 'published=false'
            echo
            echo 'These exact-SHA alpha artifacts are for controlled canary testing only.'
            echo 'They are not signed, notarized, tagged, or published as a production release.'
            echo 'Verify the unsigned SHA256 manifest before testing.'
          } > "$marker"

          manifest="canary-assets/$ASSET_PREFIX-MANIFEST-UNSIGNED.json"
          python3 ci/release/generate_canary_manifest.py \
            --artifacts canary-assets \
            --package-label "$PACKAGE_LABEL" \
            --source-version "$VERSION" \
            --configured-version "$CONFIGURED_VERSION" \
            --source-sha "$TARGET_SHA" \
            --release-candidate "$RELEASE_CANDIDATE" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --output "$manifest"

          sums="canary-assets/$ASSET_PREFIX-SHA256SUMS-UNSIGNED.txt"
          sums_name=$(basename "$sums")
          mapfile -t checksum_files < <(
            cd canary-assets
            find . -maxdepth 1 -type f ! -name "$sums_name" -printf '%P\n' | sort
          )
          test "${#checksum_files[@]}" -gt 0
          : > "$sums"
          for file in "${checksum_files[@]}"; do
            (cd canary-assets && sha256sum "$file") >> "$sums"
          done
          (cd canary-assets && sha256sum --check --strict "$sums_name")

      - name: Upload unsigned exact-SHA canary bundle
        if: ${{ needs.resolve-target.outputs.publish != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unsigned-canary-${{ needs.resolve-target.outputs.package_label }}-${{ needs.resolve-target.outputs.target_sha }}
          path: canary-assets/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload reproducibility evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ needs.resolve-target.outputs.package_label }}-reproducibility-${{ needs.resolve-target.outputs.target_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  signing-preflight:
    name: Require production signing and notarization credentials
    needs:
      - resolve-target
      - safety-gate
    if: ${{ needs.resolve-target.outputs.publish == 'true' }}
    runs-on: ubuntu-22.04
    environment: production-release
    env:
      RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
      RELEASE_GPG_FINGERPRINT: ${{ vars.RELEASE_GPG_FINGERPRINT }}
      WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_SHA256: ${{ vars.WINDOWS_CERTIFICATE_SHA256 }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
      MACOS_CERTIFICATE_P12_B64: ${{ secrets.MACOS_CERTIFICATE_P12_B64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CERTIFICATE_SHA256: ${{ vars.MACOS_CERTIFICATE_SHA256 }}
      MACOS_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_NOTARY_KEY_ID: ${{ vars.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ vars.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_PRIVATE_KEY_B64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_B64 }}
    steps:
      - name: Fail closed on every missing release credential
        shell: bash
        run: |
          set -euo pipefail
          required=(
            RELEASE_GPG_PRIVATE_KEY_B64 RELEASE_GPG_FINGERPRINT
            WINDOWS_CERTIFICATE_PFX_B64 WINDOWS_CERTIFICATE_PASSWORD
            WINDOWS_CERTIFICATE_SHA256 WINDOWS_TIMESTAMP_URL
            MACOS_CERTIFICATE_P12_B64 MACOS_CERTIFICATE_PASSWORD
            MACOS_CERTIFICATE_SHA256 MACOS_SIGNING_IDENTITY
            APPLE_TEAM_ID APPLE_NOTARY_KEY_ID APPLE_NOTARY_ISSUER_ID
            APPLE_NOTARY_PRIVATE_KEY_B64
          )
          for name in "${required[@]}"; do
            test -n "${!name}" || {
              echo "::error::Required production release credential is not configured: $name"
              exit 1
            }
          done
          [[ "$RELEASE_GPG_FINGERPRINT" =~ ^([0-9A-Fa-f]{40}|[0-9A-Fa-f]{64})$ ]]
          [[ "$WINDOWS_CERTIFICATE_SHA256" =~ ^[0-9A-Fa-f]{64}$ ]]
          [[ "$MACOS_CERTIFICATE_SHA256" =~ ^[0-9A-Fa-f]{64}$ ]]

  windows-sign:
    name: Authenticode-sign Windows artifacts
    needs:
      - resolve-target
      - select-targets
      - reproducibility
      - signing-preflight
    if: ${{ needs.resolve-target.outputs.publish == 'true' && needs.select-targets.outputs.windows_selected == 'true' }}
    runs-on: ubuntu-22.04
    environment: production-release
    env:
      TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      VERSION: ${{ needs.resolve-target.outputs.version }}
      PACKAGE_LABEL: ${{ needs.resolve-target.outputs.package_label }}
      ASSET_PREFIX: ${{ needs.resolve-target.outputs.asset_prefix }}
      SOURCE_DATE_EPOCH: ${{ needs.resolve-target.outputs.source_date_epoch }}
      WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_SHA256: ${{ vars.WINDOWS_CERTIFICATE_SHA256 }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Download reproducible Windows artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: release-${{ needs.resolve-target.outputs.package_label }}-windows-64-bit-primary-${{ needs.resolve-target.outputs.target_sha }}

      - name: Download reproducible Windows installer recipe
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: installer-recipe
          name: windows-installer-recipe-${{ needs.resolve-target.outputs.package_label }}-primary-${{ needs.resolve-target.outputs.target_sha }}

      - name: Install signing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis osslsigncode openssl p7zip-full unzip zip

      - name: Sign portable payload, rebuild installer, and verify installed signatures
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$WINDOWS_CERTIFICATE_PFX_B64" | base64 --decode > release-cert.pfx
          openssl pkcs12 -in release-cert.pfx -passin env:WINDOWS_CERTIFICATE_PASSWORD \
            -clcerts -nokeys -out release-cert.pem
          fingerprint=$(openssl x509 -in release-cert.pem -noout -fingerprint -sha256 |
            sed 's/^[^=]*=//; s/://g' | tr '[:lower:]' '[:upper:]')
          test "$fingerprint" = "${WINDOWS_CERTIFICATE_SHA256^^}"

          mkdir -p work/payload release-assets
          mapfile -t portable_archives < <(find artifacts -type f -name '*Windows-x86_64-Portable.zip' -print | sort)
          mapfile -t installer_recipes < <(find installer-recipe -type f -name setup.nsi -print | sort)
          test "${#portable_archives[@]}" -eq 1
          test "${#installer_recipes[@]}" -eq 1
          portable="${portable_archives[0]}"
          recipe="${installer_recipes[0]}"
          python3 ci/release/verify_windows_payload.py archive "$portable"
          unzip -q "$portable" -d work/payload
          python3 ci/release/verify_windows_payload.py directory work/payload
          mapfile -t executable_names < <(python3 ci/release/verify_windows_payload.py names)

          sign_file() {
            local input="$1"
            local output="$input.signed"
            printf '%s\n' "$WINDOWS_CERTIFICATE_PASSWORD" | \
              osslsigncode sign -pkcs12 release-cert.pfx -readpass /dev/stdin \
              -n "Blackcoin Core" -i "https://blackcoin.org" \
              -h sha256 -ts "$WINDOWS_TIMESTAMP_URL" \
              -in "$input" -out "$output"
            mv "$output" "$input"
            osslsigncode verify -CAfile release-cert.pem -in "$input"
          }

          for name in "${executable_names[@]}"; do
            sign_file "work/payload/$name"
          done
          python3 ci/release/verify_windows_payload.py directory work/payload

          find work/payload -type f -name '*.exe' -exec touch -d "@$SOURCE_DATE_EPOCH" {} +
          signed_portable="release-assets/$ASSET_PREFIX-Windows-x86_64-Portable.zip"
          (cd work/payload && printf '%s\n' "${executable_names[@]}" | zip -X -9j "../../$signed_portable" -@)
          python3 ci/release/verify_windows_payload.py archive "$signed_portable"
          mkdir work/portable-verification
          unzip -q "$signed_portable" -d work/portable-verification
          python3 ci/release/verify_windows_payload.py directory work/portable-verification
          for name in "${executable_names[@]}"; do
            osslsigncode verify -CAfile release-cert.pem -in "work/portable-verification/$name"
          done

          unsigned_installer="$GITHUB_WORKSPACE/work/installer-unsigned.exe"
          makensis -V2 \
            -DBLACKCOIN_SOURCE_DIR="$GITHUB_WORKSPACE" \
            -DBLACKCOIN_PAYLOAD_DIR="$GITHUB_WORKSPACE/work/payload" \
            -DBLACKCOIN_OUTPUT_FILE="$unsigned_installer" \
            "$recipe"
          test -s "$unsigned_installer"

          verify_installer_payload() {
            local installer="$1"
            local destination="$2"
            rm -rf "$destination"
            mkdir -p "$destination"
            7z x -bd -y "-o$destination" "$installer" >/dev/null
            mapfile -t installed_executables < <(
              python3 ci/release/verify_windows_payload.py installer "$destination" \
                --portable-dir work/payload
            )
            test "${#installed_executables[@]}" -eq "${#executable_names[@]}"
            for executable in "${installed_executables[@]}"; do
              osslsigncode verify -CAfile release-cert.pem -in "$executable"
            done
          }

          verify_installer_payload "$unsigned_installer" work/installer-before-outer-signing
          sign_file "$unsigned_installer"
          osslsigncode verify -CAfile release-cert.pem -in "$unsigned_installer"
          verify_installer_payload "$unsigned_installer" work/installer-after-outer-signing

          cp "$unsigned_installer" "release-assets/$ASSET_PREFIX-Windows-x86_64-Installer.exe"
          printf '%s\n' "$TARGET_SHA" > "release-assets/$ASSET_PREFIX-windows-64-bit-SOURCE_COMMIT.txt"
          rm -f release-cert.pfx release-cert.pem

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ needs.resolve-target.outputs.package_label }}-windows-signed-${{ needs.resolve-target.outputs.target_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  macos-sign:
    name: Developer-ID sign and notarize macOS artifacts
    needs:
      - resolve-target
      - select-targets
      - reproducibility
      - signing-preflight
    if: ${{ needs.resolve-target.outputs.publish == 'true' && needs.select-targets.outputs.macos_selected == 'true' }}
    runs-on: macos-15
    environment: production-release
    env:
      TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      VERSION: ${{ needs.resolve-target.outputs.version }}
      PACKAGE_LABEL: ${{ needs.resolve-target.outputs.package_label }}
      ASSET_PREFIX: ${{ needs.resolve-target.outputs.asset_prefix }}
      MACOS_CERTIFICATE_P12_B64: ${{ secrets.MACOS_CERTIFICATE_P12_B64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CERTIFICATE_SHA256: ${{ vars.MACOS_CERTIFICATE_SHA256 }}
      MACOS_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_NOTARY_KEY_ID: ${{ vars.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ vars.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_PRIVATE_KEY_B64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_B64 }}
    steps:
      - name: Download reproducible macOS app bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: release-${{ needs.resolve-target.outputs.package_label }}-macos-*-primary-${{ needs.resolve-target.outputs.target_sha }}

      - name: Import the exact Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path("release-cert.p12").write_bytes(base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_B64"], validate=True))
          Path(f"AuthKey_{os.environ['APPLE_NOTARY_KEY_ID']}.p8").write_bytes(
              base64.b64decode(os.environ["APPLE_NOTARY_PRIVATE_KEY_B64"], validate=True)
          )
          PY
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/blackcoin-release.keychain-db" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/blackcoin-release.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/blackcoin-release.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/blackcoin-release.keychain-db"
          security import release-cert.p12 -k "$RUNNER_TEMP/blackcoin-release.keychain-db" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/blackcoin-release.keychain-db"
          security list-keychains -d user -s "$RUNNER_TEMP/blackcoin-release.keychain-db"
          security default-keychain -d user -s "$RUNNER_TEMP/blackcoin-release.keychain-db"
          security find-identity -v -p codesigning "$RUNNER_TEMP/blackcoin-release.keychain-db" |
            grep -F "$MACOS_SIGNING_IDENTITY"
          security find-certificate -c "$MACOS_SIGNING_IDENTITY" -p \
            "$RUNNER_TEMP/blackcoin-release.keychain-db" > release-cert.pem
          fingerprint=$(openssl x509 -in release-cert.pem -noout -fingerprint -sha256 |
            sed 's/^[^=]*=//; s/://g' | tr '[:lower:]' '[:upper:]')
          test "$fingerprint" = "${MACOS_CERTIFICATE_SHA256^^}"

      - name: Sign, notarize, staple, and verify every macOS package
        shell: bash
        run: |
          set -euo pipefail
          trap 'security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true; rm -f release-cert.p12 release-cert.pem AuthKey_*.p8' EXIT
          mkdir -p release-assets work
          shopt -s nullglob
          archives=(artifacts/release-"$PACKAGE_LABEL"-macos-*-primary-"$TARGET_SHA"/*-Qt-app.tar.gz)
          test "${#archives[@]}" -eq 2
          for archive in "${archives[@]}"; do
            base=$(basename "$archive")
            prefix="$ASSET_PREFIX-macOS-"
            label="${base#"$prefix"}"
            label="${label%-Qt-app.tar.gz}"
            rm -rf work/*
            tar -C work -xzf "$archive"
            app=work/blackcoin-qt.app
            test -d "$app"
            codesign --force --deep --options runtime --timestamp \
              --sign "$MACOS_SIGNING_IDENTITY" "$app"
            codesign --verify --deep --strict --verbose=2 "$app"
            codesign --display --verbose=4 "$app" 2>&1 |
              grep -F "TeamIdentifier=$APPLE_TEAM_ID"

            submit_zip="work/$ASSET_PREFIX-$label-notary.zip"
            ditto -c -k --sequesterRsrc --keepParent "$app" "$submit_zip"
            xcrun notarytool submit "$submit_zip" \
              --key "AuthKey_$APPLE_NOTARY_KEY_ID.p8" \
              --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
            xcrun stapler staple "$app"
            xcrun stapler validate "$app"
            spctl --assess --type execute --verbose=2 "$app"

            ditto -c -k --sequesterRsrc --keepParent "$app" \
              "release-assets/$ASSET_PREFIX-macOS-$label-Qt-app.zip"
            dmg="release-assets/$ASSET_PREFIX-macOS-$label.dmg"
            hdiutil create -volname "Blackcoin $VERSION" -srcfolder "$app" -ov -format UDZO "$dmg"
            codesign --force --timestamp --sign "$MACOS_SIGNING_IDENTITY" "$dmg"
            codesign --verify --strict --verbose=2 "$dmg"
            xcrun notarytool submit "$dmg" \
              --key "AuthKey_$APPLE_NOTARY_KEY_ID.p8" \
              --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg"
          done

          UNIVERSAL_ROOT="$ASSET_PREFIX-macOS-Universal-Qt-apps"
          mkdir -p "universal/$UNIVERSAL_ROOT/Intel-x86_64" \
            "universal/$UNIVERSAL_ROOT/Apple-Silicon-ARM64"
          for archive in "release-assets/$ASSET_PREFIX-macOS-"*-Qt-app.zip; do
            rm -rf universal-work
            mkdir -p universal-work
            ditto -x -k "$archive" universal-work
            case "$(basename "$archive")" in
              *Intel-x86_64*) mv universal-work/blackcoin-qt.app \
                "universal/$UNIVERSAL_ROOT/Intel-x86_64/blackcoin-qt.app" ;;
              *Apple-Silicon-ARM64*) mv universal-work/blackcoin-qt.app \
                "universal/$UNIVERSAL_ROOT/Apple-Silicon-ARM64/blackcoin-qt.app" ;;
            esac
          done
          test -d "universal/$UNIVERSAL_ROOT/Intel-x86_64/blackcoin-qt.app"
          test -d "universal/$UNIVERSAL_ROOT/Apple-Silicon-ARM64/blackcoin-qt.app"
          ditto -c -k --sequesterRsrc --keepParent "universal/$UNIVERSAL_ROOT" \
            "release-assets/$UNIVERSAL_ROOT.zip"
          printf '%s\n' "$TARGET_SHA" > "release-assets/$ASSET_PREFIX-macos-SOURCE_COMMIT.txt"

      - name: Upload signed and notarized macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ needs.resolve-target.outputs.package_label }}-macos-signed-${{ needs.resolve-target.outputs.target_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish authorized GitHub release
    needs:
      - resolve-target
      - select-targets
      - build
      - reproducibility
      - signing-preflight
      - windows-sign
      - macos-sign
    if: ${{ needs.resolve-target.outputs.publish == 'true' && needs.resolve-target.outputs.target == 'all' && needs.select-targets.outputs.macos_selected == 'true' && needs.select-targets.outputs.windows_selected == 'true' }}
    runs-on: ubuntu-22.04
    environment: production-release
    permissions:
      attestations: write
      contents: write
      id-token: write
    env:
      TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      VERSION: ${{ needs.resolve-target.outputs.version }}
      PACKAGE_LABEL: ${{ needs.resolve-target.outputs.package_label }}
      ASSET_PREFIX: ${{ needs.resolve-target.outputs.asset_prefix }}
      TAG: ${{ needs.resolve-target.outputs.tag }}
      SOURCE_DATE_EPOCH: ${{ needs.resolve-target.outputs.source_date_epoch }}
      RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
      RELEASE_GPG_FINGERPRINT: ${{ vars.RELEASE_GPG_FINGERPRINT }}
    steps:
      - name: Checkout immutable release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 0

      - name: Download only exact-SHA release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: release-${{ needs.resolve-target.outputs.package_label }}-*-${{ needs.resolve-target.outputs.target_sha }}

      - name: Download exact-SHA quantum crypto provenance evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: gate-evidence/quantum-crypto
          name: quantum-crypto-provenance-${{ needs.resolve-target.outputs.target_sha }}

      - name: Install release packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gnupg zip

      - name: Import and verify the exact release signing key
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          export GNUPGHOME="$RUNNER_TEMP/blackcoin-release-gnupg"
          mkdir -m 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY_B64" | base64 --decode > release-private-key.asc
          gpg --batch --import release-private-key.asc
          rm -f release-private-key.asc
          fingerprint=$(gpg --batch --with-colons --fingerprint "$RELEASE_GPG_FINGERPRINT" |
            awk -F: '$1 == "fpr" {print toupper($10); exit}')
          test "$fingerprint" = "${RELEASE_GPG_FINGERPRINT^^}"
          gpg --batch --with-colons --list-secret-keys "$RELEASE_GPG_FINGERPRINT" |
            grep -q '^sec:'
          gpg --batch --list-keys "$RELEASE_GPG_FINGERPRINT" 2>&1 |
            grep -F 'Blackcoin-Dev'
          gpg --batch --list-keys "$RELEASE_GPG_FINGERPRINT" 2>&1 |
            grep -F '298119138+Blackcoin-Dev@users.noreply.github.com'

      - name: Assemble exact-SHA release
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          mkdir -p dist
          find artifacts/release-"$PACKAGE_LABEL"-linux-*-primary-"$TARGET_SHA" -type f -exec cp {} dist/ \;
          find artifacts/release-"$PACKAGE_LABEL"-windows-signed-"$TARGET_SHA" -type f -exec cp {} dist/ \;
          find artifacts/release-"$PACKAGE_LABEL"-macos-signed-"$TARGET_SHA" -type f -exec cp {} dist/ \;
          find artifacts/release-"$PACKAGE_LABEL"-reproducibility-"$TARGET_SHA" -type f -exec cp {} dist/ \;

          test -s "dist/$ASSET_PREFIX-Linux-x86_64.tar.gz"
          test -s "dist/$ASSET_PREFIX-Linux-ARM64.tar.gz"
          test -s "dist/$ASSET_PREFIX-Windows-x86_64-Portable.zip"
          test -s "dist/$ASSET_PREFIX-Windows-x86_64-Installer.exe"
          test -s "dist/$ASSET_PREFIX-macOS-Intel-x86_64-Qt-app.zip"
          test -s "dist/$ASSET_PREFIX-macOS-Apple-Silicon-ARM64-Qt-app.zip"
          test -s "dist/$ASSET_PREFIX-macOS-Intel-x86_64.dmg"
          test -s "dist/$ASSET_PREFIX-macOS-Apple-Silicon-ARM64.dmg"
          test -s "dist/$ASSET_PREFIX-macOS-Universal-Qt-apps.zip"
          test -s "dist/$ASSET_PREFIX-REPRODUCIBILITY.txt"
          test -s gate-evidence/quantum-crypto/quantum-crypto-provenance-evidence.json
          cp gate-evidence/quantum-crypto/quantum-crypto-provenance-evidence.json \
            "dist/Blackcoin-$VERSION-quantum-crypto-provenance.json"
          cp contrib/devtools/quantum-crypto-provenance.json \
            "dist/Blackcoin-$VERSION-quantum-crypto-manifest.json"
          printf '%s\n' "$TARGET_SHA" > dist/SOURCE_COMMIT.txt
          gpg --batch --armor --export "$RELEASE_GPG_FINGERPRINT" > \
            "dist/Blackcoin-$VERSION-RELEASE-KEY.asc"

          python3 ci/release/generate_spdx_sbom.py \
            --artifacts dist --depends-packages depends/packages \
            --version "$VERSION" --source-sha "$TARGET_SHA" \
            --source-date-epoch "$SOURCE_DATE_EPOCH" \
            --output "dist/Blackcoin-$VERSION-SBOM.spdx.json"
          python3 ci/release/generate_provenance.py \
            --artifacts dist --repository "$GITHUB_REPOSITORY" \
            --source-sha "$TARGET_SHA" --version "$VERSION" --tag "$TAG" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --output "dist/Blackcoin-$VERSION-provenance.intoto.json"

          gpg --batch --yes --armor --detach-sign \
            --local-user "$RELEASE_GPG_FINGERPRINT" \
            --output "dist/Blackcoin-$VERSION-provenance.intoto.json.asc" \
            "dist/Blackcoin-$VERSION-provenance.intoto.json"
          (cd dist && find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt*' -printf '%P\n' |
            sort | while IFS= read -r file; do sha256sum "$file"; done > SHA256SUMS.txt)
          gpg --batch --yes --armor --detach-sign \
            --local-user "$RELEASE_GPG_FINGERPRINT" \
            --output dist/SHA256SUMS.txt.asc dist/SHA256SUMS.txt
          gpg --batch --verify dist/SHA256SUMS.txt.asc dist/SHA256SUMS.txt
          gpg --batch --verify \
            "dist/Blackcoin-$VERSION-provenance.intoto.json.asc" \
            "dist/Blackcoin-$VERSION-provenance.intoto.json"
          (cd dist && sha256sum --check --strict SHA256SUMS.txt)

          cp "doc/release-notes/release-notes-$VERSION.md" RELEASE_NOTES.md
          {
            echo
            echo "## Source commit"
            echo
            echo "\`$TARGET_SHA\`"
            echo
            echo "## SHA256 checksums"
            echo
            echo '| Archive | Checksum |'
            echo '| --- | --- |'
            while read -r hash file; do
              echo "| $file | $hash |"
            done < dist/SHA256SUMS.txt
          } >> RELEASE_NOTES.md

      - name: Publish GitHub build-provenance attestations
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-checksums: dist/SHA256SUMS.txt

      - name: Publish GitHub SBOM attestations
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3.0.0
        with:
          subject-checksums: dist/SHA256SUMS.txt
          sbom-path: dist/Blackcoin-${{ needs.resolve-target.outputs.version }}-SBOM.spdx.json

      - name: Create an immutable release at the signed tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse "refs/tags/$TAG^{commit}")" = "$TARGET_SHA"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists; production releases are immutable"
            exit 1
          fi
          gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --draft \
            --verify-tag --title "Blackcoin Core v$VERSION" --notes-file RELEASE_NOTES.md
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
