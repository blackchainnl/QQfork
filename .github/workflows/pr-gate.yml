name: pull-request safety gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Full commit SHA to test (defaults to the selected branch)
        required: false
        type: string
      release_mode:
        description: Also run production-only exhaustive, native macOS, sanitizer, and fuzz gates
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      target_sha:
        description: Immutable commit SHA to test
        required: true
        type: string
      release_mode:
        description: Run release-only exhaustive tests
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Keep an open pull request's full gate independent from an exact-SHA alpha
  # artifact gate for the same commit. Superseded runs of the same event/mode
  # still cancel normally, while production runs remain non-cancelable.
  group: safety-gate-${{ github.event_name }}-${{ inputs.release_mode == true && 'release' || 'core' }}-${{ inputs.target_sha || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ inputs.release_mode != true }}

env:
  TARGET_SHA: ${{ inputs.target_sha || github.event.pull_request.head.sha || github.sha }}
  HOST: x86_64-pc-linux-gnu
  MAKEJOBS: 4

jobs:
  policy-and-lint:
    name: source identity, workflow syntax, and lint
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Verify repository and source identity
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || 'f647dc75c9479c03e81414f145a8d233b60959c7' }}
        run: |
          set -euo pipefail
          args=(
            --base "$BASE_SHA"
            --head "$TARGET_SHA"
            --repository "$GITHUB_REPOSITORY"
          )
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            args+=(--require-actor --actor "$GITHUB_ACTOR")
          fi
          python3 ci/release/verify_source_identity.py "${args[@]}"

      - name: Reject malformed patch whitespace
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || 'f647dc75c9479c03e81414f145a8d233b60959c7' }}
        run: git diff --check "$BASE_SHA...$TARGET_SHA"

      - name: Verify dependency, advisory, capability, and provenance evidence
        run: python3 ci/release/verify_dependency_security.py

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-pip shellcheck
          python3 -m pip install --user \
            codespell==2.2.5 \
            flake8==6.1.0 \
            lief==0.13.2 \
            mypy==1.4.1 \
            pyzmq==25.1.0 \
            vulture==2.6

      - name: Parse workflow YAML
        run: ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.parse_file(path) }'

      - name: Validate workflow semantics with pinned actionlint
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint_1.7.9_linux_amd64.tar.gz"
          curl --location --fail --silent --show-error \
            https://github.com/rhysd/actionlint/releases/download/v1.7.9/actionlint_1.7.9_linux_amd64.tar.gz \
            --output "$archive"
          echo '233b280d05e100837f4af1433c7b40a5dcb306e3aa68fb4f17f8a7f45a7df7b4  '"$archive" |
            sha256sum --check --strict
          tar -C "$RUNNER_TEMP" -xzf "$archive" actionlint
          "$RUNNER_TEMP/actionlint" -color

      - name: Test fail-closed release tooling
        run: |
          python3 ci/release/test_release_tools.py
          python3 ci/release/test_shadow_resource_production.py

      - name: Test script corpus precondition tooling
        run: |
          python3 ci/test/test_verify_script_assets.py
          python3 test/fuzz/test_runner_tests.py

      - name: Run repository linters
        shell: bash
        env:
          COMMIT_RANGE: ${{ github.event.pull_request.base.sha || 'f647dc75c9479c03e81414f145a8d233b60959c7' }}..${{ env.TARGET_SHA }}
        run: |
          set -euo pipefail
          test/lint/check-doc.py
          test/lint/all-lint.py

  crypto-source-provenance:
    name: pinned independent quantum crypto provenance
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Download and verify pinned upstream sources and vectors
        run: |
          python3 contrib/devtools/verify-quantum-crypto-sources.py \
            --fetch-upstream "$RUNNER_TEMP/quantum-crypto-upstream" \
            --require-upstream \
            --repository "$GITHUB_REPOSITORY" \
            --source-commit "$TARGET_SHA" \
            --evidence quantum-crypto-provenance-evidence.json

      - name: Upload exact-source provenance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quantum-crypto-provenance-${{ env.TARGET_SHA }}
          path: quantum-crypto-provenance-evidence.json
          if-no-files-found: error
          retention-days: 30

  native-build-and-unit:
    name: pinned native build and unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            automake bison build-essential cmake gettext gperf libtool \
            pkg-config python3 python3-zmq

      - name: Build pinned dependencies
        run: |
          make -j "$MAKEJOBS" -C depends \
            HOST="$HOST" NO_QT=1 NO_UPNP=1 NO_NATPMP=1

      - name: Configure debug and lock-order build
        run: |
          ./autogen.sh
          ./configure \
            --prefix="$PWD/depends/$HOST" \
            --with-gui=no \
            --enable-debug \
            --enable-bench \
            --disable-zmq

      - name: Compile candidate
        run: make -j "$MAKEJOBS"

      - name: Provision pinned Blackcoin-compatible script vectors
        env:
          DIR_UNIT_TEST_DATA: ${{ github.workspace }}/.ci/unit_test_data
        run: ./ci/test/prepare_script_assets.sh

      - name: Run unit and utility tests
        env:
          DIR_UNIT_TEST_DATA: ${{ github.workspace }}/.ci/unit_test_data
          REQUIRE_SCRIPT_ASSETS_TEST: 1
        run: make -j "$MAKEJOBS" check

      - name: Upload exact test binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: safety-gate-native-${{ env.TARGET_SHA }}
          path: |
            src/blackcoind
            src/blackcoin-cli
            src/blackcoin-tx
            src/blackcoin-util
            src/blackcoin-wallet
            src/bench/bench_blackcoin
            src/Makefile
            test/config.ini
          if-no-files-found: error
          retention-days: 3

  resource-benchmarks-linux:
    name: measured worst-case quantum crypto resources (Linux x86_64)
    needs: native-build-and-unit
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Download exact benchmark binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: safety-gate-native-${{ env.TARGET_SHA }}
          path: .

      - name: Run source-bound worst-case benchmarks
        shell: bash
        run: |
          set -euo pipefail
          binary=src/bench/bench_blackcoin
          raw=quantum-resource-linux-x86_64-nanobench.json
          evidence=quantum-resource-linux-x86_64-evidence.json
          cxx=$(sed -n 's/^CXX = //p' src/Makefile)
          cxxflags=$(sed -n 's/^CXXFLAGS = //p' src/Makefile)
          test -n "$cxx"
          test -n "$cxxflags"
          chmod +x "$binary"
          "$binary" \
            -filter='Quantum(Argon2id|MLDSA44|LargeBlock|SyntheticState).*' \
            -min-time=250 \
            -output-json="$raw"
          python3 ci/release/generate_resource_benchmark_evidence.py \
            --nanobench-json "$raw" \
            --binary "$binary" \
            --source-sha "$TARGET_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --repo-root . \
            --platform linux \
            --architecture x86_64 \
            --toolchain "$cxx; $(c++ --version | sed -n '1p')" \
            --compiler-flags="$cxxflags" \
            --build-profile native-debug-lockorder \
            --minimum-runtime-ms 250 \
            --provenance-manifest contrib/devtools/quantum-crypto-provenance.json \
            --require-domain crypto \
            --require-domain large-block \
            --require-domain synthetic-state \
            --output "$evidence"

      - name: Upload measured resource evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quantum-resource-benchmarks-linux-x86_64-${{ env.TARGET_SHA }}
          path: quantum-resource-linux-x86_64-*.json
          if-no-files-found: error
          retention-days: 30

  native-linux-arm64-crypto:
    name: Linux ARM64 native cryptographic vectors and resources
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 300
    env:
      ARM64_HOST: aarch64-linux-gnu
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout and native architecture
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test "$(uname -m)" = "aarch64"
          python3 - <<'PY'
          import platform
          assert platform.system() == "Linux"
          assert platform.machine().lower() in {"aarch64", "arm64"}
          PY

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            automake bison build-essential cmake gettext gperf libtool \
            pkg-config python3

      - name: Restore pinned native dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: depends/built
          key: native-linux-arm64-${{ hashFiles('depends/*.mk', 'depends/packages/*', 'depends/patches/**/*') }}

      - name: Build pinned native dependencies
        run: |
          make -j "$MAKEJOBS" -C depends HOST="$ARM64_HOST" \
            NO_WALLET=1 NO_QT=1 NO_UPNP=1 NO_NATPMP=1

      - name: Configure native walletless benchmark build
        run: |
          ./autogen.sh
          ./configure \
            --prefix="$PWD/depends/$ARM64_HOST" \
            --disable-wallet --with-gui=no --enable-bench --disable-zmq

      - name: Compile and run native vectors
        shell: bash
        run: |
          set -euo pipefail
          make -C src -j "$MAKEJOBS" test/test_blackcoin bench/bench_blackcoin
          for suite in dbwrapper_tests crypto_hardening_tests demurrage_tests shadow_tests; do
            src/test/test_blackcoin --run_test="$suite" --log_level=test_suite
          done

      - name: Measure native Linux ARM64 resources
        shell: bash
        run: |
          set -euo pipefail
          raw=quantum-resource-linux-arm64-nanobench.json
          evidence=quantum-resource-linux-arm64-evidence.json
          cxx=$(sed -n 's/^CXX = //p' src/Makefile)
          cxxflags=$(sed -n 's/^CXXFLAGS = //p' src/Makefile)
          test -n "$cxx"
          test -n "$cxxflags"
          src/bench/bench_blackcoin \
            -filter='Quantum(Argon2id|MLDSA44|LargeBlock|SyntheticState).*' \
            -min-time=250 \
            -output-json="$raw"
          python3 ci/release/generate_resource_benchmark_evidence.py \
            --nanobench-json "$raw" \
            --binary src/bench/bench_blackcoin \
            --source-sha "$TARGET_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --repo-root . \
            --platform linux \
            --architecture arm64 \
            --toolchain "$cxx; $($cxx --version | sed -n '1p')" \
            --compiler-flags="$cxxflags" \
            --build-profile native-linux-arm64-walletless \
            --minimum-runtime-ms 250 \
            --provenance-manifest contrib/devtools/quantum-crypto-provenance.json \
            --require-domain crypto \
            --require-domain large-block \
            --require-domain synthetic-state \
            --output "$evidence"

      - name: Upload native Linux ARM64 resource evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quantum-resource-benchmarks-linux-arm64-${{ env.TARGET_SHA }}
          path: quantum-resource-linux-arm64-*.json
          if-no-files-found: error
          retention-days: 30

  native-linux-arm64-ubsan:
    name: Linux ARM64 native UBSan block-harness gate
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    needs: native-linux-arm64-crypto
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 300
    env:
      ARM64_HOST: aarch64-linux-gnu
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout and native architecture
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test "$(uname -m)" = "aarch64"

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            automake bison build-essential cmake gettext gperf libtool \
            pkg-config python3

      - name: Restore pinned native dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: depends/built
          key: native-linux-arm64-${{ hashFiles('depends/*.mk', 'depends/packages/*', 'depends/patches/**/*') }}

      - name: Build pinned native dependencies
        run: |
          make -j "$MAKEJOBS" -C depends HOST="$ARM64_HOST" \
            NO_WALLET=1 NO_QT=1 NO_UPNP=1 NO_NATPMP=1

      - name: Configure native UBSan harness build
        run: |
          ./autogen.sh
          ./configure \
            --prefix="$PWD/depends/$ARM64_HOST" \
            --disable-wallet --with-gui=no --disable-bench --disable-zmq \
            --enable-fuzz-binary --with-sanitizers=undefined

      - name: Run unaligned CRC and initialized block-harness regressions
        shell: bash
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1:report_error_type=1
        run: |
          set -euo pipefail
          make -C src -j "$MAKEJOBS" test/test_blackcoin test/fuzz/fuzz
          src/test/test_blackcoin \
            --run_test=dbwrapper_tests/crc32c_accepts_unaligned_arm64_input \
            --log_level=test_suite
          src/test/test_blackcoin \
            --run_test=crypto_hardening_tests \
            --log_level=test_suite
          mkdir -p "$RUNNER_TEMP/fuzz-corpus/block"
          python3 test/fuzz/test_runner.py \
            --par=1 "$RUNNER_TEMP/fuzz-corpus" block

  windows-crypto-cross-build:
    name: Build pinned Windows x86_64 vector binaries
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    env:
      WINDOWS_HOST: x86_64-w64-mingw32
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Install Windows cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            automake bison build-essential cmake gettext gperf libtool \
            pkg-config python3 g++-mingw-w64-x86-64-posix

      - name: Build pinned Windows dependencies
        run: |
          make -j "$MAKEJOBS" -C depends HOST="$WINDOWS_HOST" \
            NO_WALLET=1 NO_QT=1 NO_UPNP=1 NO_NATPMP=1

      - name: Configure and compile Windows vectors
        shell: bash
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure \
            --prefix="$PWD/depends/$WINDOWS_HOST" \
            --disable-wallet --with-gui=no --enable-bench --disable-zmq \
            --disable-shared \
            LDFLAGS="-static -static-libgcc -static-libstdc++"
          make -C src -j "$MAKEJOBS" \
            test/test_blackcoin.exe bench/bench_blackcoin.exe
          mkdir -p ci/scratch
          cxx_line=$(sed -n 's/^CXX = //p' src/Makefile)
          test -n "$cxx_line"
          test "$(printf '%s\n' "$cxx_line" | wc -l)" -eq 1
          read -r -a cxx_argv <<< "$cxx_line"
          test "${#cxx_argv[@]}" -ge 1
          "${cxx_argv[@]}" --version | sed -n '1p' > ci/scratch/windows-cross-compiler.txt
          python3 ci/release/verify_windows_native_binary.py \
            --binary src/test/test_blackcoin.exe \
            --binary src/bench/bench_blackcoin.exe \
            --source-sha "$TARGET_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --output-manifest ci/scratch/windows-native-inputs.json

      - name: Upload exact Windows vector binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-native-vector-inputs-${{ env.TARGET_SHA }}
          path: |
            src/test/test_blackcoin.exe
            src/bench/bench_blackcoin.exe
            src/Makefile
            ci/scratch/windows-cross-compiler.txt
            ci/scratch/windows-native-inputs.json
          if-no-files-found: error
          retention-days: 3

  native-windows-crypto:
    name: Windows x86_64 native cryptographic vectors and resources
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    needs: windows-crypto-cross-build
    runs-on: windows-2025
    timeout-minutes: 180
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout and native architecture
        shell: pwsh
        run: |
          if ((git rev-parse HEAD) -ne $env:TARGET_SHA) { throw "source mismatch" }
          if ($env:PROCESSOR_ARCHITECTURE -ne "AMD64") { throw "not native x86_64" }
          if ([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -ne "X64") {
            throw "runtime architecture is not x86_64"
          }

      - name: Download exact Windows vector binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-native-vector-inputs-${{ env.TARGET_SHA }}
          path: .

      - name: Run native Windows vectors and resource measurements
        shell: bash
        run: |
          set -euo pipefail
          python ci/release/verify_windows_native_binary.py \
            --binary src/test/test_blackcoin.exe \
            --binary src/bench/bench_blackcoin.exe \
            --source-sha "$TARGET_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --expected-manifest ci/scratch/windows-native-inputs.json
          for suite in dbwrapper_tests crypto_hardening_tests demurrage_tests shadow_tests; do
            src/test/test_blackcoin.exe \
              --run_test="$suite" --log_level=test_suite
          done
          raw=quantum-resource-windows-x86_64-nanobench.json
          evidence=quantum-resource-windows-x86_64-evidence.json
          cxx=$(sed -n 's/^CXX = //p' src/Makefile)
          cxxflags=$(sed -n 's/^CXXFLAGS = //p' src/Makefile)
          toolchain=$(tr -d '\r\n' < ci/scratch/windows-cross-compiler.txt)
          test -n "$cxx"
          test -n "$cxxflags"
          test -n "$toolchain"
          src/bench/bench_blackcoin.exe \
            -filter='Quantum(Argon2id|MLDSA44|LargeBlock|SyntheticState).*' \
            -min-time=250 \
            -output-json="$raw"
          python ci/release/generate_resource_benchmark_evidence.py \
            --nanobench-json "$raw" \
            --binary src/bench/bench_blackcoin.exe \
            --source-sha "$TARGET_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --repo-root . \
            --platform windows \
            --architecture x86_64 \
            --toolchain "$cxx; $toolchain" \
            --compiler-flags="$cxxflags" \
            --build-profile mingw-pinned-native-windows \
            --minimum-runtime-ms 250 \
            --provenance-manifest contrib/devtools/quantum-crypto-provenance.json \
            --require-domain crypto \
            --require-domain large-block \
            --require-domain synthetic-state \
            --output "$evidence"

      - name: Upload native Windows resource evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quantum-resource-benchmarks-windows-x86_64-${{ env.TARGET_SHA }}
          path: quantum-resource-windows-x86_64-*.json
          if-no-files-found: error
          retention-days: 30

  native-macos-crypto:
    name: ${{ matrix.name }} native cryptographic vectors
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-15-intel
            host: x86_64-apple-darwin
            expected_arch: x86_64
          - name: macOS Apple Silicon
            runner: macos-15
            host: aarch64-apple-darwin
            expected_arch: arm64
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout and native architecture
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test "$(uname -m)" = "${{ matrix.expected_arch }}"

      - name: Install native build tools
        run: brew install automake libtool pkg-config

      - name: Build pinned native dependencies
        run: |
          make -j 2 -C depends HOST=${{ matrix.host }} \
            NO_WALLET=1 NO_QT=1 NO_UPNP=1 NO_NATPMP=1

      - name: Configure walletless native test build
        run: |
          ./autogen.sh
          ./configure \
            --prefix="$PWD/depends/${{ matrix.host }}" \
            --disable-wallet --with-gui=no --enable-bench --disable-zmq

      - name: Compile and run cryptographic and monetary vectors
        run: |
          make -C src -j 2 test/test_blackcoin bench/bench_blackcoin
          for suite in crypto_hardening_tests demurrage_tests shadow_tests; do
            src/test/test_blackcoin --run_test="$suite" --log_level=test_suite
          done

      - name: Measure worst-case quantum crypto resources
        shell: bash
        run: |
          set -euo pipefail
          raw=quantum-resource-macos-${{ matrix.expected_arch }}-nanobench.json
          evidence=quantum-resource-macos-${{ matrix.expected_arch }}-evidence.json
          cxx=$(sed -n 's/^CXX = //p' src/Makefile)
          cxxflags=$(sed -n 's/^CXXFLAGS = //p' src/Makefile)
          test -n "$cxx"
          test -n "$cxxflags"
          src/bench/bench_blackcoin \
            -filter='Quantum(Argon2id|MLDSA44|LargeBlock|SyntheticState).*' \
            -min-time=250 \
            -output-json="$raw"
          python3 ci/release/generate_resource_benchmark_evidence.py \
            --nanobench-json "$raw" \
            --binary src/bench/bench_blackcoin \
            --source-sha "$TARGET_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --repo-root . \
            --platform macos \
            --architecture "${{ matrix.expected_arch }}" \
            --toolchain "$cxx; $(clang++ --version | sed -n '1p')" \
            --compiler-flags="$cxxflags" \
            --build-profile native-walletless-default \
            --minimum-runtime-ms 250 \
            --provenance-manifest contrib/devtools/quantum-crypto-provenance.json \
            --require-domain crypto \
            --require-domain large-block \
            --require-domain synthetic-state \
            --output "$evidence"

      - name: Upload native resource evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quantum-resource-benchmarks-macos-${{ matrix.expected_arch }}-${{ env.TARGET_SHA }}
          path: quantum-resource-macos-${{ matrix.expected_arch }}-*.json
          if-no-files-found: error
          retention-days: 30

  critical-protocol:
    name: critical Gold Rush, lifecycle, wallet, and recovery tests
    needs: native-build-and-unit
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Download exact test binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: safety-gate-native-${{ env.TARGET_SHA }}
          path: .

      - name: Restore executable permissions
        run: chmod +x src/blackcoind src/blackcoin-cli src/blackcoin-tx src/blackcoin-util src/blackcoin-wallet

      - name: Run critical protocol and wallet gates
        run: |
          python3 test/functional/test_runner.py \
            --ci --jobs=2 --failfast --combinedlogslen=999999 \
            feature_quantum_activation_boundary.py \
            feature_blackcoin_phase.py \
            feature_goldrush_migration_rpc.py \
            feature_goldrush_legacy_compat.py \
            feature_goldrush_shadow_replay.py \
            feature_goldrush_reorg.py \
            feature_goldrush_pow_miner_e2e.py \
            'feature_goldrush_pow_contention.py --descriptors' \
            feature_goldrush_pow_claim_singleflight.py \
            feature_goldrush_pos_signal.py \
            feature_goldrush_pos_multiwallet_stress.py \
            feature_goldrush_pos_single_utxo.py \
            feature_goldrush_pos_unrestricted.py \
            feature_goldrush_value_path.py \
            feature_goldrush_height_schedule_multinode.py \
            feature_goldrush_schedule_controls.py \
            feature_goldrush_coldstake_auto_migration.py \
            feature_goldrush_coinstatsindex.py \
            feature_quantum_lifecycle.py \
            feature_quantum_demurrage.py \
            feature_quantum_demurrage_height_boundary.py \
            feature_quantum_final_lockout_sighash.py \
            feature_quantum_staking_tiers.py \
            feature_quantum_stake_reward_split.py \
            feature_quantum_pool_cap.py \
            feature_quantum_redelegation.py \
            feature_quantum_redelegation_auto.py \
            feature_quantum_coldstaking.py \
            wallet_quantum_coin_selection.py \
            'wallet_quantum_key_safety.py --legacy-wallet' \
            'wallet_quantum_key_safety.py --descriptors' \
            wallet_pos_multiwallet_staking.py \
            wallet_backup.py \
            wallet_encryption.py \
            feature_dbcrash.py \
            feature_chainstate_rebuild_lifecycle.py \
            feature_config_args.py \
            feature_reindex.py \
            feature_shutdown.py

  mixed-version:
    name: real v26.2, v28.4, v30.1, and candidate interoperability
    needs: native-build-and-unit
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Download exact candidate binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: safety-gate-native-${{ env.TARGET_SHA }}
          path: .

      - name: Restore candidate executable permissions
        run: chmod +x src/blackcoind src/blackcoin-cli src/blackcoin-tx src/blackcoin-util src/blackcoin-wallet

      - name: Install historical build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            automake bison build-essential cmake gettext gperf libtool \
            pkg-config python3 python3-zmq

      - name: Restore pull-request historical-binary cache
        if: ${{ inputs.release_mode != true }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .ci/previous-releases
          key: mixed-version-${{ runner.os }}-${{ hashFiles('ci/mixed-version/sources.json', 'ci/mixed-version/build_previous_releases.py') }}

      - name: Build and verify historical binaries
        run: |
          python3 ci/mixed-version/build_previous_releases.py \
            --output "$PWD/.ci/previous-releases" \
            --build-root "$RUNNER_TEMP/blackcoin-previous-builds" \
            --host "$HOST" \
            --jobs "$MAKEJOBS"

      - name: Run mixed-version relay and reorg test
        env:
          PREVIOUS_RELEASES_DIR: ${{ github.workspace }}/.ci/previous-releases
        run: |
          python3 test/functional/test_runner.py \
            --ci --jobs=1 --failfast --combinedlogslen=999999 \
            feature_goldrush_mixed_version.py --previous-releases --legacy-wallet

      - name: Upload historical binary provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mixed-version-provenance-${{ env.TARGET_SHA }}
          path: .ci/previous-releases/provenance.json
          if-no-files-found: error
          retention-days: 30

  exhaustive-functional:
    name: complete functional and soak suite
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    needs: native-build-and-unit
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Download exact test binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: safety-gate-native-${{ env.TARGET_SHA }}
          path: .

      - name: Restore executable permissions
        run: chmod +x src/blackcoind src/blackcoin-cli src/blackcoin-tx src/blackcoin-util src/blackcoin-wallet

      - name: Run all default and extended functional tests
        run: |
          python3 test/functional/test_runner.py \
            --ci --extended --jobs=4 --combinedlogslen=999999 \
            --exclude=feature_goldrush_mixed_version.py

  sanitizer-gates:
    name: ${{ matrix.name }} consensus and liveness gate
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: address-undefined-sanitizer
            environment: ci/test/00_setup_env_native_asan.sh
            functional_tests: >-
              feature_goldrush_shadow_replay.py
              feature_goldrush_pow_claim_singleflight.py
              feature_goldrush_pos_signal.py
              feature_goldrush_pos_multiwallet_stress.py
              feature_goldrush_pos_signal_recovery.py
              wallet_pos_multiwallet_staking.py
              feature_quantum_lifecycle.py
              feature_quantum_demurrage_height_boundary.py
              feature_shutdown.py
          - name: thread-sanitizer
            environment: ci/test/00_setup_env_native_tsan.sh
            functional_tests: >-
              feature_goldrush_pow_claim_singleflight.py
              feature_goldrush_pos_signal.py
              feature_goldrush_pos_multiwallet_stress.py
              feature_goldrush_pos_signal_recovery.py
              wallet_pos_multiwallet_staking.py
              feature_shutdown.py
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Run sanitizer gate with pinned consensus dependencies
        env:
          CI_OS_NAME: linux
          FILE_ENV: ${{ matrix.environment }}
          MAKEJOBS: -j2
          TEST_RUNNER_EXTRA: ${{ matrix.functional_tests }}
        run: ./ci/test_run_all.sh

  fuzz-smoke:
    name: pinned-corpus sanitizer fuzz smoke
    if: ${{ inputs.release_mode == true || github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
      - name: Checkout immutable candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0

      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Build and run the pinned fuzz corpus
        env:
          CI_OS_NAME: linux
          FILE_ENV: ci/test/00_setup_env_native_fuzz.sh
          MAKEJOBS: -j2
        run: ./ci/test_run_all.sh
